name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Create mock .env
        run: |
          cat > .env << ENVEOF
          PINECONE_API_KEY=test_key
          PINECONE_INDEX_NAME=taxai-index
          GROQ_API_KEY=test_key
          GOOGLE_API_KEY=test_key
          LANGSMITH_API_KEY=test_key
          ELASTICSEARCH_URL=http://localhost:9200
          SQLITE_PATH=./data/taxai.db
          DATA_DIR=./data
          PDF_CACHE_DIR=./data/pdfs
          ENVEOF

      - name: Run unit tests
        run: |
          pytest ../tests/unit/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

  # ── Frontend tests ─────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0 || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t taxai-backend:test ./backend

      - name: Build frontend image
        run: docker build -t taxai-frontend:test ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000