name: CD — Deploy to Render

on:
  push:
    branches: [main]       # only deploy from main
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  # ── Run tests first — never deploy broken code ────────────────────────────
  test:
    name: Run Tests Before Deploy
    uses: ./.github/workflows/ci.yml   # reuse the CI workflow

  # ── Deploy backend to Render ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test             # only runs if tests pass
    environment: production

    steps:
      - name: Trigger Render backend deploy
        run: |
          curl -f -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for backend deploy to complete
        run: |
          echo "Waiting 60s for backend to come up..."
          sleep 60
          curl -f "${{ secrets.BACKEND_URL }}/health" || exit 1
          echo "Backend health check passed."

  # ── Deploy frontend to Render ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend   # frontend deploys after backend is healthy

    steps:
      - name: Trigger Render frontend deploy
        run: |
          curl -f -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for frontend deploy to complete
        run: |
          echo "Waiting 60s for frontend to come up..."
          sleep 60
          curl -f "${{ secrets.FRONTEND_URL }}" || exit 1
          echo "Frontend health check passed."

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "::error::Deployment failed. Check logs above."